<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
       <h2>Student Portal</h2>

       <nav>

           <ul>
              <li><a href="#">Home</a></li>
              <li><a href="#">Courses</a></li>
              <li><a href="#">Profile</a></li>
              <li><a href="#">Grades</a></li>
            </ul>

       </nav>
    </header>
    <main>
        <section id="hero">
            <h1>Welcome to the Student Portal</h1>

            <p>
               Access your courses, grades, and profile from one place.
            </p>

               <button>Explore Courses</button>
        </section>
            <section id="stats">

                <div class="stat">
                    <h3>Courses Enrolled</h3>
                    <p>3</p>
                </div>

                <div class="stat">
                    <h3>GPA</h3>
                    <p>3.8</p>
                </div>

                <div class="stat">
                    <h3>Semester</h3>
                    <p>6</p>
                </div>

        </section>
        <section id="courses">

            <h2>Available Courses</h2>
            <input
            type="text"
            id="search-course"
            placeholder="Search courses...">

            <button id="sort-btn">
            Sort By Credits
            </button>

            <div class="course-grid"></div>
            <p id="total-credits"></p>

        </section>
    </main>
    <footer>
        <p>&copy; 2026 Student Portal. All Rights Reserved.</p>
    </footer>
    <script type="module" src="app.js"></script>
</body>
</html>
