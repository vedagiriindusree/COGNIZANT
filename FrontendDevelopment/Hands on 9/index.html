<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">EduPortal</div>
        <nav aria-label="Main navigation">
            <a href="#">Home</a>
            <a href="#" aria-current="page">Courses</a>
            <a href="#">Profile</a>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Welcome to the Student Portal</h1>
            <p>Your one-stop destination to track your courses, grades, and profile details seamlessly!</p>
            <button>Explore Courses</button>
        </section>

        <section id="student-stats">
            <div class="stat-item">
                Courses Enrolled: <span id="course-count" aria-live="polite" role="status">0</span>
            </div>
            <div class="stat-item">GPA: 3.8</div>
            <div class="stat-item">Semester: 6</div>
        </section>

        <section id="courses">
            <h2>Enrolled Courses</h2>
            
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="search-courses" aria-label="Search courses by name" placeholder="Search courses by name..." style="padding: 10px; flex: 1; border: 1px solid #ccc; border-radius: 5px;">
                <button id="sort-credits" style="padding: 10px 20px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">Sort by Credits</button>
            </div>

            <div class="course-grid"></div>

            <p id="total-credits" style="margin-top: 20px; font-weight: bold; font-size: 18px; color: #2c3e50;"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Portal. All rights reserved.</p>
    </footer>

    <script type="module" src="app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/css-vars-ponyfill@2"></script>
    <script>
      cssVars({
        onlyLegacy: true
      });
    </script>
</body>
</html>
